<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 290" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif">
  <defs>
    <marker id="ah3" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#64748b"/>
    </marker>
  </defs>

  <rect width="880" height="290" fill="#ffffff"/>

  <!-- step 1: the operator -->
  <rect x="50" y="100" width="175" height="70" rx="10" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="137" y="130" font-size="13" font-weight="700" fill="#1e293b" text-anchor="middle">push a commit</text>
  <text x="137" y="149" font-size="11" fill="#64748b" text-anchor="middle">human or agent</text>

  <!-- step 2 -->
  <rect x="255" y="100" width="175" height="70" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="342" y="130" font-size="13" font-weight="700" fill="#1e40af" text-anchor="middle">webhook fires,</text>
  <text x="342" y="149" font-size="13" font-weight="700" fill="#1e40af" text-anchor="middle">Flux reconciles</text>

  <!-- step 3 -->
  <rect x="460" y="100" width="175" height="70" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="547" y="130" font-size="13" font-weight="700" fill="#1e40af" text-anchor="middle">cluster converges</text>
  <text x="547" y="149" font-size="11" fill="#64748b" text-anchor="middle">on what the repo says</text>

  <!-- step 4 -->
  <rect x="665" y="100" width="175" height="70" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="752" y="130" font-size="13" font-weight="700" fill="#1e40af" text-anchor="middle">telemetry and alerts</text>
  <text x="752" y="149" font-size="11" fill="#64748b" text-anchor="middle">Grafana &#183; Alertmanager &#183; ntfy</text>

  <!-- forward arrows -->
  <path d="M225,135 L247,135" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#ah3)"/>
  <path d="M430,135 L452,135" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#ah3)"/>
  <path d="M635,135 L657,135" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#ah3)"/>

  <!-- loop back -->
  <path d="M752,170 L752,235 L137,235 L137,178" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#ah3)"/>
  <text x="445" y="226" font-size="11.5" fill="#64748b" text-anchor="middle">consequences feed the next commit</text>
</svg>
